<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World Cup Trading Signals</title>
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a1a; color: #e8e8f0; font-family: Arial, sans-serif; padding: 20px; }
h1 { font-size: 28px; color: #a78bfa; text-align: center; margin-bottom: 5px; }
.subtitle { text-align: center; color: #7c7c9e; font-size: 12px; margin-bottom: 20px; }
.topbar { display: flex; justify-content: space-between; align-items: center; background: #13132b; border: 1px solid #2d2d5e; padding: 10px 20px; border-radius: 8px; margin-bottom: 20px; }
.btn-connect { padding: 10px 20px; background: #7c3aed; color: #fff; border: none; cursor: pointer; font-weight: bold; border-radius: 6px; }
.btn-connect:hover { background: #6d28d9; }
.btn-disconnect { padding: 10px 20px; background: #ef4444; color: #fff; border: none; cursor: pointer; font-weight: bold; border-radius: 6px; display: none; }
.btn-disconnect:hover { background: #dc2626; }
button { padding: 10px 20px; background: #7c3aed; color: #fff; border: none; cursor: pointer; font-weight: bold; border-radius: 6px; }
button:hover { background: #6d28d9; }
.stats-bar { background: #13132b; border: 1px solid #2d2d5e; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; gap: 30px; font-size: 12px; flex-wrap: wrap; }
.stat { text-align: center; }
.stat-val { color: #a78bfa; font-weight: bold; font-size: 20px; }
.signal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-bottom: 20px; }
.signal-card { background: #13132b; border: 1px solid #2d2d5e; border-radius: 10px; padding: 20px; }
.signal-card.buy { border-color: #10b981; }
.signal-card.sell { border-color: #ef4444; }
.signal-card.hold { border-color: #f59e0b; }
.signal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
.match-name { font-size: 14px; font-weight: bold; }
.signal-badge { font-size: 12px; font-weight: bold; padding: 4px 12px; border-radius: 20px; }
.badge-buy { background: #10b981; color: #000; }
.badge-sell { background: #ef4444; color: #fff; }
.badge-hold { background: #f59e0b; color: #000; }
.odds-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; }
.odds-label { color: #7c7c9e; }
.odds-value { font-weight: bold; }
.result-badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-left: 5px; }
.result-win { background: #10b981; color: #000; }
.result-loss { background: #ef4444; color: #fff; }
.confidence-bar { background: #0a0a1a; border-radius: 10px; height: 8px; margin: 10px 0; overflow: hidden; }
.confidence-fill { height: 100%; border-radius: 10px; }
.ai-reason { font-size: 11px; color: #b9c4ba; margin-top: 10px; padding: 8px; background: #0a0a1a; border-radius: 6px; line-height: 1.5; }
.write-btn { width: 100%; padding: 8px; margin-top: 10px; background: #7c3aed; color: #fff; border: none; cursor: pointer; font-weight: bold; border-radius: 6px; font-size: 11px; }
.score-display { text-align: center; font-size: 20px; font-weight: bold; color: #a78bfa; margin: 10px 0; }
#log { background: #13132b; border: 1px solid #2d2d5e; padding: 15px; border-radius: 8px; margin-top: 20px; font-size: 11px; color: #7c7c9e; max-height: 150px; overflow-y: auto; }
.refresh-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
.live-dot { display: inline-block; width: 8px; height: 8px; background: #10b981; border-radius: 50%; margin-right: 6px; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>

<h1>⚡ World Cup Trading Signals</h1>
<p class="subtitle">AI-Powered Odds Analysis | TxLINE Live Data | Solana On-Chain Signals</p>

<div class="topbar">
  <div style="font-size:11px; color:#7c7c9e;">Program: DQvUS9W1q6scsf2w5mLXcZfsvkf645pKYYQN8p6rhsMq</div>
  <div style="display:flex; gap:10px; align-items:center;">
    <div id="walletAddr" style="font-size:12px; color:#a78bfa;"></div>
    <button class="btn-connect" id="connectBtn">Connect Phantom</button>
    <button class="btn-disconnect" id="disconnectBtn">Disconnect</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-val" id="totalSignals">0</div><div>Signals</div></div>
  <div class="stat"><div class="stat-val" id="buySignals" style="color:#10b981;">0</div><div>BUY</div></div>
  <div class="stat"><div class="stat-val" id="sellSignals" style="color:#ef4444;">0</div><div>SELL</div></div>
  <div class="stat"><div class="stat-val" id="holdSignals" style="color:#f59e0b;">0</div><div>HOLD</div></div>
  <div class="stat"><div class="stat-val" id="onChain">0</div><div>On-Chain</div></div>
</div>

<div class="refresh-bar">
  <div><span class="live-dot"></span><span style="font-size:12px; color:#10b981;">TxLINE Live + WorldCup26 Results</span></div>
  <button id="refreshBtn">🔄 Refresh Signals</button>
</div>

<div class="signal-grid" id="signalGrid">
  <div style="color:#7c7c9e; padding:20px;">Loading signals...</div>
</div>

<div id="log"><div style="color:#a78bfa;">📋 Activity Log</div></div>

<script>
var wallet = null;
var txlineJwt = null;
var onChainCount = 0;
var prevOdds = {};
var wcGames = [];
var API_TOKEN = "txoracle_api_e44c346212fe433c8b42b4bae17ce33d";
var TXLINE = "https://txline-dev.txodds.com";
var WC_TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjZhNGE1MmM5YjMwMTVlNWJmM2ViZTU3NCIsImlhdCI6MTc4MzI1NTc4MywiZXhwIjoxNzkwNTEzMzgzfQ.4Fvylt8oovD-9b1FWLWwjpPKubBHzsvsZKBD2coP_dA";

var FIXTURES = [
  { id: 18187298, home: "Brazil", away: "Norway", homeOddsBase: 2.065, awayOddsBase: 5.398 },
  { id: 18192996, home: "Mexico", away: "England", homeOddsBase: 3.2, awayOddsBase: 2.1 },
  { id: 18193785, home: "USA", away: "Belgium", homeOddsBase: 2.8, awayOddsBase: 2.6 },
  { id: 18198205, home: "Portugal", away: "Spain", homeOddsBase: 2.4, awayOddsBase: 2.9 },
  { id: 18202701, home: "Argentina", away: "Egypt", homeOddsBase: 1.4, awayOddsBase: 8.5 },
  { id: 18202783, home: "Switzerland", away: "Colombia", homeOddsBase: 2.1, awayOddsBase: 3.4 },
  { id: 18209181, home: "France", away: "Morocco", homeOddsBase: 1.6, awayOddsBase: 6.2 }
];

async function getTxLineJwt() {
  var res = await fetch(TXLINE + "/auth/guest/start", { method: "POST" });
  var data = await res.json();
  txlineJwt = data.token;
  return txlineJwt;
}

async function loadWCGames() {
  try {
    var res = await fetch("https://worldcup26.ir/get/games", {
      headers: { "Authorization": "Bearer " + WC_TOKEN }
    });
    var data = await res.json();
    wcGames = data.games || [];
  } catch(e) {}
}

function findWCGame(home, away) {
  return wcGames.find(function(g) {
    return g.home_team_name_en === home && g.away_team_name_en === away;
  });
}

async function getOdds(fixtureId) {
  try {
    var jwt = await getTxLineJwt();
    var res = await fetch(TXLINE + "/api/odds/snapshot/" + fixtureId, {
      headers: { "Authorization": "Bearer " + jwt, "X-Api-Token": API_TOKEN }
    });
    var data = await res.json();
    var market = data.find(function(d) { return d.SuperOddsType === "1X2_PARTICIPANT_RESULT"; });
    if (market && market.Prices && market.Prices.length >= 3) {
      return { home: market.Prices[0] / 1000, draw: market.Prices[1] / 1000, away: market.Prices[2] / 1000 };
    }
    return null;
  } catch(e) { return null; }
}

function analyzeSignal(fixture, odds, game) {
  var signal, target, confidence, reason;
  var isFinished = game && game.time_elapsed === "finished";

  if (isFinished) {
    var hs = parseInt(game.home_score) || 0;
    var as = parseInt(game.away_score) || 0;
    var homeFavorite = fixture.homeOddsBase < fixture.awayOddsBase;

    if (hs > as && !homeFavorite) {
      signal = "SELL"; target = fixture.home; confidence = 82;
      reason = "⚠️ " + fixture.home + " won as underdog (" + hs + "-" + as + "). Market overreaction — take profits, SELL signal.";
    } else if (as > hs && homeFavorite) {
      signal = "SELL"; target = fixture.home; confidence = 88;
      reason = "🔴 Upset! " + fixture.home + " lost (" + hs + "-" + as + ") as favorite. Sharp reversal — SELL " + fixture.home + ".";
    } else if (hs > as && homeFavorite) {
      signal = "BUY"; target = fixture.home; confidence = 72;
      reason = "✅ " + fixture.home + " delivered as favorite (" + hs + "-" + as + "). Momentum play — BUY for next round.";
    } else if (as > hs && !homeFavorite) {
      signal = "BUY"; target = fixture.away; confidence = 78;
      reason = "⚡ " + fixture.away + " upset win (" + hs + "-" + as + ")! Underdog momentum — BUY for next round.";
    } else {
      signal = "HOLD"; target = fixture.home; confidence = 50;
      reason = "Draw result. Uncertain momentum — HOLD until next match.";
    }
  } else if (odds) {
    var key = fixture.id;
    var prev = prevOdds[key];
    var homeChange = prev ? ((odds.home - prev.home) / prev.home) * 100 : 0;
    var awayChange = prev ? ((odds.away - prev.away) / prev.away) * 100 : 0;
    prevOdds[key] = { home: odds.home, away: odds.away };

    if (homeChange < -3) {
      signal = "BUY"; target = fixture.home;
      confidence = Math.min(92, Math.round(70 + Math.abs(homeChange) * 2));
      reason = "📈 Sharp money on " + fixture.home + "! Odds dropped " + Math.abs(homeChange).toFixed(1) + "% — BUY signal.";
    } else if (awayChange < -3) {
      signal = "BUY"; target = fixture.away;
      confidence = Math.min(92, Math.round(68 + Math.abs(awayChange) * 2));
      reason = "📈 Smart money on " + fixture.away + "! Odds dropped " + Math.abs(awayChange).toFixed(1) + "% — BUY signal.";
    } else if (homeChange > 4) {
      signal = "SELL"; target = fixture.home;
      confidence = Math.min(88, Math.round(65 + homeChange * 1.5));
      reason = "📉 Money leaving " + fixture.home + ". Odds drifting " + homeChange.toFixed(1) + "% — SELL signal.";
    } else if (awayChange > 4) {
      signal = "SELL"; target = fixture.away;
      confidence = Math.min(88, Math.round(65 + awayChange * 1.5));
      reason = "📉 " + fixture.away + " odds drifting " + awayChange.toFixed(1) + "% — SELL signal.";
    } else if (odds.home < odds.away) {
      signal = "BUY"; target = fixture.home;
      confidence = Math.min(80, Math.round(58 + (odds.away - odds.home) * 3));
      reason = "📊 " + fixture.home + " is market favorite at " + odds.home.toFixed(2) + "x. Stable BUY signal.";
    } else {
      signal = "HOLD"; target = fixture.home; confidence = 52;
      reason = "⏳ Odds stable, no significant movement. Wait for clearer signal.";
    }
  } else {
    signal = "HOLD"; target = fixture.home; confidence = 45;
    reason = "No odds data available. Match may not have started yet.";
  }

  return { signal: signal, target: target, confidence: Math.min(95, Math.max(40, confidence)), reason: reason };
}

function getConfidenceColor(c) {
  return c >= 75 ? "#10b981" : c >= 60 ? "#f59e0b" : "#ef4444";
}

function renderSignal(fixture, odds, analysis, game) {
  var sc = analysis.signal.toLowerCase();
  var color = getConfidenceColor(analysis.confidence);
  var isFinished = game && game.time_elapsed === "finished";
  var homeOdds = odds ? odds.home.toFixed(2) + "x" : fixture.homeOddsBase.toFixed(2) + "x";
  var drawOdds = odds ? odds.draw.toFixed(2) + "x" : "3.20x";
  var awayOdds = odds ? odds.away.toFixed(2) + "x" : fixture.awayOddsBase.toFixed(2) + "x";
  var homeResult = ""; var awayResult = "";
  var scoreStr = "";

  if (isFinished) {
    var hs = parseInt(game.home_score) || 0;
    var as = parseInt(game.away_score) || 0;
    scoreStr = hs + " - " + as;
    homeResult = hs > as ? "<span class='result-badge result-win'>WIN</span>" : hs < as ? "<span class='result-badge result-loss'>LOSS</span>" : "";
    awayResult = as > hs ? "<span class='result-badge result-win'>WIN</span>" : as < hs ? "<span class='result-badge result-loss'>LOSS</span>" : "";
  }

  return "<div class='signal-card " + sc + "'>" +
    "<div class='signal-header'><div class='match-name'>" + fixture.home + " vs " + fixture.away + "</div>" +
    "<div class='signal-badge badge-" + sc + "'>" + analysis.signal + "</div></div>" +
    (scoreStr ? "<div class='score-display'>" + scoreStr + "</div>" : "") +
    "<div class='odds-row'><span class='odds-label'>" + fixture.home + homeResult + "</span><span class='odds-value'>" + homeOdds + "</span></div>" +
    "<div class='odds-row'><span class='odds-label'>Draw</span><span class='odds-value'>" + drawOdds + "</span></div>" +
    "<div class='odds-row'><span class='odds-label'>" + fixture.away + awayResult + "</span><span class='odds-value'>" + awayOdds + "</span></div>" +
    "<div style='margin-top:10px;'>" +
    "<div style='display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;'>" +
    "<span style='color:#7c7c9e;'>Confidence</span><span style='color:" + color + ";font-weight:bold;'>" + analysis.confidence + "%</span></div>" +
    "<div class='confidence-bar'><div class='confidence-fill' style='width:" + analysis.confidence + "%;background:" + color + ";'></div></div></div>" +
    "<div class='ai-reason'>🤖 <strong>" + analysis.signal + " " + analysis.target + "</strong><br>" + analysis.reason + "</div>" +
    "<button class='write-btn' onclick='writeSignal(" + fixture.id + ",\"" + fixture.home + "\",\"" + fixture.away + "\",\"" + analysis.signal + "\",\"" + analysis.target + "\"," + analysis.confidence + ")'>⛓ Record Signal On-Chain</button>" +
    "</div>";
}

async function loadSignals() {
  document.getElementById("signalGrid").innerHTML = "<div style='color:#7c7c9e;padding:20px;'>Loading...</div>";
  addLog("Fetching data...");
  await loadWCGames();

  var html = ""; var buy = 0, sell = 0, hold = 0;
  for (var i = 0; i < FIXTURES.length; i++) {
    var f = FIXTURES[i];
    var odds = await getOdds(f.id);
    var game = findWCGame(f.home, f.away);
    var analysis = analyzeSignal(f, odds, game);
    html += renderSignal(f, odds, analysis, game);
    if (analysis.signal === "BUY") buy++;
    else if (analysis.signal === "SELL") sell++;
    else hold++;
  }

  document.getElementById("signalGrid").innerHTML = html;
  document.getElementById("totalSignals").textContent = FIXTURES.length;
  document.getElementById("buySignals").textContent = buy;
  document.getElementById("sellSignals").textContent = sell;
  document.getElementById("holdSignals").textContent = hold;
  addLog("✓ " + buy + " BUY, " + sell + " SELL, " + hold + " HOLD");
}

async function writeSignal(fixtureId, home, away, signal, target, confidence) {
  if (!wallet) { addLog("Connect wallet first!"); return; }
  try {
    addLog("Recording signal on-chain...");
    var connection = new solanaWeb3.Connection("https://api.devnet.solana.com", "confirmed");
    var pubkey = wallet.publicKey;
    var memo = "TradingSignal:" + fixtureId + ":" + home + "vs" + away + ":" + signal + ":" + target + ":conf=" + confidence;
    var tx = new solanaWeb3.Transaction().add(
      new solanaWeb3.TransactionInstruction({
        keys: [{ pubkey: pubkey, isSigner: true, isWritable: false }],
        programId: new solanaWeb3.PublicKey("MemoSq4gqABAXKb96qnH8TysNcWxMyWCqXgDLGmfcHr"),
        data: Buffer.from(memo)
      })
    );
    tx.feePayer = pubkey;
    var bh = await connection.getLatestBlockhash();
    tx.recentBlockhash = bh.blockhash;
    var signed = await wallet.signTransaction(tx);
    var txid = await connection.sendRawTransaction(signed.serialize());
    onChainCount++;
    document.getElementById("onChain").textContent = onChainCount;
    addLog("✓ " + signal + " " + target + " recorded! Conf: " + confidence + "%");
    addLog('<a style="color:#a78bfa;" href="https://explorer.solana.com/tx/' + txid + '?cluster=devnet" target="_blank">' + txid.slice(0,20) + "...</a>");
  } catch(e) { addLog("Error: " + e.message); }
}

function addLog(msg) {
  var div = document.createElement("div");
  div.style.margin = "3px 0";
  div.innerHTML = msg;
  document.getElementById("log").appendChild(div);
  document.getElementById("log").scrollTop = 9999;
}

document.getElementById("connectBtn").addEventListener("click", function() {
  if (!window.solana) { addLog("Phantom not found!"); return; }
  window.solana.connect().then(function(r) {
    wallet = window.solana;
    document.getElementById("walletAddr").textContent = r.publicKey.toString().slice(0,8) + "...";
    document.getElementById("connectBtn").style.display = "none";
    document.getElementById("disconnectBtn").style.display = "block";
    addLog("✓ Connected: " + r.publicKey.toString().slice(0,8) + "...");
  }).catch(function(e) { addLog("Error: " + e.message); });
});

document.getElementById("disconnectBtn").addEventListener("click", function() {
  wallet = null;
  document.getElementById("walletAddr").textContent = "";
  document.getElementById("connectBtn").style.display = "block";
  document.getElementById("disconnectBtn").style.display = "none";
  addLog("Disconnected");
});

document.getElementById("refreshBtn").addEventListener("click", loadSignals);
loadSignals();
setInterval(loadSignals, 60000);
</script>
</body>
</html>
